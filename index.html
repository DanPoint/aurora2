let ac,mg,pg,ng;
function iau(){
  try{
    ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended')ac.resume();
    const wake=()=>{if(ac.state==='suspended')ac.resume();};
    document.addEventListener('touchstart',wake,{once:false});
    document.addEventListener('click',wake,{once:false});
    mg=ac.createGain();mg.gain.value=.18;const comp=ac.createDynamicsCompressor();comp.threshold.value=-12;comp.ratio.value=4;comp.attack.value=.003;comp.release.value=.25;mg.connect(comp);comp.connect(ac.destination);
    pg=ac.createGain();pg.gain.value=0;
    const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=800;f.Q.value=2;
    pg.connect(f);f.connect(mg);
    [110,164.81,220].forEach(fr=>{
      const o=ac.createOscillator();o.type='sine';
      o.frequency.value=fr+(Math.random()-.5)*.5;
      const g=ac.createGain();g.gain.value=.3;
      o.connect(g);g.connect(pg);o.start();
    });
    pg.gain.linearRampToValueAtTime(.08,ac.currentTime+4);
    const bs=2*ac.sampleRate,nb=ac.createBuffer(1,bs,ac.sampleRate),da=nb.getChannelData(0);

    const no=ac.createBufferSource();no.buffer=nb;no.loop=true;
    const nf=ac.createBiquadFilter();nf.type='lowpass';nf.frequency.value=600;nf.Q.value=.3;
    ng=ac.createGain();ng.gain.value=0;

}
const pluckScale=[110,130.81,146.83,164.81,196,220,261.63,293.66,329.63,392,440,523.25,587.33,659.25,783.99];
function pluck(x,y){if(!ac)return null;if(window._skipPluck)return null;const t=ac.currentTime;const yn=Math.max(0,Math.min(1,(y+.6)/1.2));const idx=Math.floor(yn*(pluckScale.length-1));const p=pluckScale[idx]*Math.pow(2,octave);const o=ac.createOscillator();o.type='triangle';o.frequency.value=p;const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.35,t+.015);g.gain.exponentialRampToValueAtTime(.001,t+3.5);const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=1200+Math.abs(x)*2000;f.Q.value=3;o.connect(f);f.connect(g);g.connect(mg);o.start(t);o.stop(t+3.6);return{o:o,f:f,born:t};}

setTimeout(()=>{const t2=ac.currentTime,b=ac.createOscillator();b.type='sine';b.frequency.setValueAtTime(80,t2);b.frequency.exponentialRampToValueAtTime(20,t2+2);const bg=ac.createGain();bg.gain.setValueAtTime(.6,t2);bg.gain.exponentialRampToValueAtTime(.001,t2+2);b.connect(bg);bg.connect(mg);b.start(t2);b.stop(t2+2);},3800);}

let singTrig=false,cyc=0;

// ===== FIREFLIES & CONSTELLATIONS =====
(function(){
  const flies=[];
  const bursts=[];
  const constellations={};
  let started=false;
  let phraseCounter=0;
  function waitStart(){
    if(typeof ac!=='undefined'&&ac&&ac.state==='running'){
      started=true;spawn();
    } else setTimeout(waitStart,500);
  }
  waitStart();
  function phrase(){
    if(!started)return;
    const w=innerWidth,h=innerHeight;
    const baseHue=Math.random()*360;
    const hueSpread=20+Math.random()*35;
    const len=4+Math.floor(Math.random()*6);
    const stepGap=160+Math.random()*220;
    let stepNote=2+Math.floor(Math.random()*6);
    const pid=++phraseCounter;
    constellations[pid]={stars:[],size:len,hue:baseHue,deathAt:null,finale:false,finaleStart:0};
    const yFromStep=s=>{
      const margin=Math.min(120,h*.15);
      const norm=s/9;
      return h-margin-norm*(h-margin*2);
    };
    for(let i=0;i<len;i++){
      setTimeout(()=>{
        if(!started)return;
        const r=Math.random();
        let delta;
        if(r<.55)delta=(Math.random()<.5?-1:1);
        else if(r<.85)delta=(Math.random()<.5?-2:2);

        const y=yFromStep(stepNote)+(Math.random()-.5)*40;
        const driftAngle=Math.random()*Math.PI*2;
        const driftSpeed=.1+Math.random()*.3;
        const vx=Math.cos(driftAngle)*driftSpeed;
        const vy=Math.sin(driftAngle)*driftSpeed;
        const hue=(baseHue+(Math.random()-.5)*hueSpread+360)%360;
          flies.push({
          x,y,vx,vy,
          r:16+Math.random()*10,
          hue,
          life:1,
          born:performance.now(),
          step:stepNote,
          fadeIn:0,
          pid:pid,
          phaseX:Math.random()*Math.PI*2,
          phaseY:Math.random()*Math.PI*2,
          freqX:.3+Math.random()*.25,
          freqY:.35+Math.random()*.3,
          trail:[]

    setTimeout(()=>{
      const con=constellations[pid];

  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';

      const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
      const g=ac.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.12,t+.03);
      g.gain.exponentialRampToValueAtTime(.001,t+2.8);
      o.connect(g);g.connect(mg);
      o.start(t);o.stop(t+2.9);
    });
  }
  function draw(){
    cx.clearRect(0,0,innerWidth,innerHeight);
    const now=performance.now();
    if(window._clearFlies){
      window._clearFlies=false;
      for(const f of flies){
        bursts.push({x:f.x,y:f.y,hue:f.hue,r:0,life:1,born:now});
      }
      flies.length=0;
      for(const pid in constellations)constellations[pid].deathAt=now+800;
    }
    const wind=window._tilt||{x:0,y:0};
    const windX=wind.x*.6;
    const tSec=now*.001;
    for(let i=flies.length-1;i>=0;i--){
      const f=flies[i];
      const floatX=Math.sin(tSec*f.freqX+f.phaseX)*.7;
      const floatY=Math.cos(tSec*f.freqY+f.phaseY)*.55;
            f.vx=f.vx*.94+floatX*.09+windX*.18;
      f.vy=f.vy*.94+floatY*.09;
      f.x+=f.vx;f.y+=f.vy;
      if(f.fadeIn<1)f.fadeIn=Math.min(1,f.fadeIn+.03);
      const bright=(.7+.3*Math.sin((now-f.born)*.004))*f.fadeIn;
      const w=innerWidth,h=innerHeight;
      if(f.x<-80||f.x>w+80||f.y<-80||f.y>h+80){flies.splice(i,1);continue;}
      f.trail.push(f.x,f.y);
      if(f.trail.length>60)f.trail.splice(0,2);
      const tlen=f.trail.length;
      if(tlen>=4){
        for(let k=0;k<tlen-2;k+=2){
          const frac=k/tlen;
          const a=frac*.45*f.fadeIn;
          cx.strokeStyle=`hsla(${f.hue},95%,80%,${a})`;
          cx.lineWidth=4*frac;
          cx.lineCap='round';
          cx.beginPath();
          cx.moveTo(f.trail[k],f.trail[k+1]);
          cx.lineTo(f.trail[k+2],f.trail[k+3]);
          cx.stroke();
        }
      }
      const g1=cx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*3);
      g1.addColorStop(0,`hsla(${f.hue},90%,75%,${.5*bright})`);
      g1.addColorStop(.3,`hsla(${f.hue},90%,65%,${.2*bright})`);
      g1.addColorStop(1,`hsla(${f.hue},90%,55%,0)`);
      cx.fillStyle=g1;
      cx.beginPath();cx.arc(f.x,f.y,f.r*3,0,Math.PI*2);cx.fill();
      const g2=cx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      g2.addColorStop(0,`hsla(${f.hue},100%,95%,${.9*bright})`);
      g2.addColorStop(.5,`hsla(${f.hue},100%,80%,${.6*bright})`);
      g2.addColorStop(1,`hsla(${f.hue},100%,70%,0)`);
      cx.fillStyle=g2;
      cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);cx.fill();
    }
    for(const pid in constellations){
      const con=constellations[pid];
      if(con.stars.length<2){
        if(con.deathAt&&now>con.deathAt)delete constellations[pid];
        continue;
      }
      let alpha=1;
      if(con.deathAt){
        const tl=con.deathAt-now;
        if(tl<=0){delete constellations[pid];continue;}
        if(!con.finale)alpha=Math.min(1,tl/3000);
      }
      let pulse=0;
      if(con.finale){
        const fa=(now-con.finaleStart)/2000;
        pulse=Math.sin(fa*Math.PI*4)*.5+.5;
        alpha=Math.max(0,1-fa);
      }
      const lw=1.2+pulse*2;
      cx.lineWidth=lw;
      cx.strokeStyle=`hsla(${con.hue},80%,75%,${alpha*.45})`;
      cx.beginPath();
      cx.moveTo(con.stars[0].x,con.stars[0].y);
      for(let k=1;k<con.stars.length;k++)cx.lineTo(con.stars[k].x,con.stars[k].y);
      if(con.finale)cx.lineTo(con.stars[0].x,con.stars[0].y);
      cx.stroke();
      if(con.finale){
        cx.strokeStyle=`hsla(${con.hue},90%,85%,${alpha*pulse*.8})`;
        cx.lineWidth=lw*2;
        cx.stroke();
      }
      for(const s of con.stars){
        const sr=3+pulse*4;
        const g=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,sr*3);
        g.addColorStop(0,`hsla(${s.hue},100%,90%,${alpha*.9})`);
        g.addColorStop(1,`hsla(${s.hue},100%,70%,0)`);
        cx.fillStyle=g;
        cx.beginPath();cx.arc(s.x,s.y,sr*3,0,Math.PI*2);cx.fill();
      }
    }
    for(let i=bursts.length-1;i>=0;i--){
      const b=bursts[i];
      const LIFE=2.5;
      const age=(now-b.born)/1000;
      if(age>LIFE){bursts.splice(i,1);continue;}
      b.life=1-age/LIFE;
      if(b.particle){
        b.x+=b.vx;b.y+=b.vy;b.vx*=.95;b.vy*=.95;
        cx.fillStyle=`hsla(${b.hue},100%,85%,${b.life})`;
        cx.beginPath();cx.arc(b.x,b.y,b.r*b.life,0,Math.PI*2);cx.fill();
        } else {
        b.r+=6*b.life;
        const fade=b.life*b.life;
        cx.strokeStyle=`hsla(${b.hue},95%,60%,${fade*.85})`;
        cx.lineWidth=3*b.life;
        cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.stroke();
        cx.strokeStyle=`hsla(${b.hue},100%,75%,${fade*.35})`;
        cx.lineWidth=8*b.life;
        cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
    draw();
})();

// ===== CHOIR (idle drone) =====
(function(){
  let choirNodes=null, choirGain=null, choirStarted=false;
  let lastInteract=performance.now();
  window.addEventListener('touchstart',()=>{lastInteract=performance.now();},{passive:true});
  window.addEventListener('mousedown',()=>{lastInteract=performance.now();});
  window.addEventListener('touchmove',()=>{lastInteract=performance.now();},{passive:true});
  function build(){
    if(typeof ac==='undefined'||!ac||!mg)return false;
    choirGain=ac.createGain();choirGain.gain.value=0;
    const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=900;form.Q.value=4;
    const form2=ac.createBiquadFilter();form2.type='peaking';form2.frequency.value=1800;form2.Q.value=3;form2.gain.value=6;
    choirGain.connect(form);form.connect(form2);form2.connect(mg);
    const root=110;
    const ratios=[1,1.5,2];
    choirNodes=[];
    ratios.forEach((ra,i)=>{
      const o=ac.createOscillator();o.type='sawtooth';o.frequency.value=root*ra;
      const g=ac.createGain();g.gain.value=.12;
      const lfo=ac.createOscillator();lfo.type='sine';lfo.frequency.value=4.5+i*.7;
      const lfoGain=ac.createGain();lfoGain.gain.value=root*ra*.004;
      lfo.connect(lfoGain);lfoGain.connect(o.frequency);
      o.connect(g);g.connect(choirGain);
      o.start();lfo.start();
      choirNodes.push({o,g,baseRatio:ra});
    });
    return true;
  }
  function retune(){
    if(!choirNodes)return;
    const oct=(typeof octave!=='undefined'?octave:0);
    const base=pluckScale[5]*Math.pow(2,oct)*.5;
    choirNodes.forEach(n=>{
      n.o.frequency.setTargetAtTime(base*n.baseRatio,ac.currentTime,1.5);
    });
  }
  function tick(){
    if(!choirStarted){
      if(build()){choirStarted=true;setTimeout(()=>{if(choirGain)choirGain.gain.setTargetAtTime(.06,ac.currentTime,2);},2500);}
    } else {
      const idle=(performance.now()-lastInteract)/1000;
      const target=idle>3?.06:0;
      if(choirGain)choirGain.gain.setTargetAtTime(target,ac.currentTime,idle>3?3:1.5);
      retune();
    }
    setTimeout(tick,800);
  }
  function wait(){if(typeof ac!=='undefined'&&ac&&ac.state==='running')tick();else setTimeout(wait,500);}
  wait();
})();

// ===== SLIDE GESTURE EVENTS =====
(function(){
  let slide=null;
  let nextAt=performance.now()+20000;
  const cv2=document.createElement('canvas');
  cv2.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9998';
  document.body.appendChild(cv2);
  const cx2=cv2.getContext('2d');
  function resize2(){cv2.width=innerWidth*devicePixelRatio;cv2.height=innerHeight*devicePixelRatio;cv2.style.width=innerWidth+'px';cv2.style.height=innerHeight+'px';cx2.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
  resize2();addEventListener('resize',resize2);
  function spawn(){
    const w=innerWidth,h=innerHeight;
    const margin=80;
    const dirs=[
      ()=>{const y=margin+Math.random()*(h-margin*2);return{ax:margin,ay:y,bx:w-margin,by:y+(Math.random()-.5)*80};},
      ()=>{const y=margin+Math.random()*(h-margin*2);return{ax:w-margin,ay:y,bx:margin,by:y+(Math.random()-.5)*80};},
      ()=>{const x=margin+Math.random()*(w-margin*2);return{ax:x,ay:margin,bx:x+(Math.random()-.5)*80,by:h-margin};},
      ()=>{const x=margin+Math.random()*(w-margin*2);return{ax:x,ay:h-margin,bx:x+(Math.random()-.5)*80,by:margin};},
      ()=>({ax:margin,ay:h-margin,bx:w-margin,by:margin}),
      ()=>({ax:w-margin,ay:h-margin,bx:margin,by:margin})
    ];
    const d=dirs[Math.floor(Math.random()*dirs.length)]();
    const hueBase=Math.random()*360;
    const curve=(Math.random()-.5)*0.3;
    slide={
      ax:d.ax,ay:d.ay,bx:d.bx,by:d.by,
      cx:(d.ax+d.bx)/2+(d.by-d.ay)*curve,
      cy:(d.ay+d.by)/2+(d.ax-d.bx)*curve,
      hue:hueBase,
      born:performance.now(),
      life:5.5,
      appeared:0,
      progress:0,
      hunting:false,
      active:false,
      voice:null,
      failed:false,
      completed:false,
      completedAt:0
    };
  }
  function pointOnCurve(s,t){
    const it=1-t;
    const x=it*it*s.ax+2*it*t*s.cx+t*t*s.bx;
    const y=it*it*s.ay+2*it*t*s.cy+t*t*s.by;
    return{x,y};
  }
  function startVoice(){
    if(typeof ac==='undefined'||!ac)return null;
    const t=ac.currentTime;
    const o=ac.createOscillator();o.type='triangle';
    const g=ac.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.22,t+.08);
    const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=1500;f.Q.value=4;
    o.connect(f);f.connect(g);g.connect(mg);
    o.start(t);
    return{o,g,f,born:t};
  }
  function stopVoice(v,success){
    if(!v)return;
    const t=ac.currentTime;
    if(success){
      const oct=(typeof octave!=='undefined'?octave:0);
      const notes=[0,2,4,7].map(i=>pluckScale[(i+5)%pluckScale.length]*Math.pow(2,oct));
      notes.forEach((fr,i)=>{
        const o=ac.createOscillator();o.type='sine';o.frequency.value=fr;
        const g=ac.createGain();const st=t+i*.05;
        g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.2,st+.02);g.gain.exponentialRampToValueAtTime(.001,st+2.5);
        o.connect(g);g.connect(mg);o.start(st);o.stop(st+2.6);
      });
    }
    v.g.gain.setTargetAtTime(0,t,.15);
    v.o.stop(t+.5);
  }
  function updateVoice(s){
    if(!s.voice||!ac)return;
    const oct=(typeof octave!=='undefined'?octave:0);
    const idx=Math.floor(s.progress*(pluckScale.length-1));
    const nextIdx=Math.min(pluckScale.length-1,idx+1);
    const fr=pluckScale[idx]*(1-s.progress*(pluckScale.length-1)%1)+pluckScale[nextIdx]*(s.progress*(pluckScale.length-1)%1);
    const freq=pluckScale[Math.floor(s.progress*(pluckScale.length-1))]*Math.pow(2,oct)*(1+s.progress*.3);
    s.voice.o.frequency.setTargetAtTime(freq,ac.currentTime,.04);
    s.voice.f.frequency.setTargetAtTime(800+s.progress*4000,ac.currentTime,.05);
  }
  function tryHit(x,y){
    if(!slide||slide.completed||slide.failed)return false;
    if(slide.appeared<.5)return false;
    let best=1,bestT=0;
    for(let i=0;i<=20;i++){
      const t=i/20;
      const p=pointOnCurve(slide,t);
      const d=Math.hypot(p.x-x,p.y-y);
      if(d<best*200){best=d/200;bestT=t;}
    }
    const p=pointOnCurve(slide,bestT);
    const dist=Math.hypot(p.x-x,p.y-y);
    if(dist<60&&bestT<.15){
      slide.hunting=true;slide.active=true;slide.progress=bestT;
      slide.voice=startVoice();
      return true;
    }
    return false;
  }
  function moveHit(x,y){
    if(!slide||!slide.active)return;
    let best=1e9,bestT=slide.progress;
    for(let i=0;i<=30;i++){
      const t=Math.max(0,Math.min(1,slide.progress-.1+i/30*.3));
      const p=pointOnCurve(slide,t);
      const d=Math.hypot(p.x-x,p.y-y);
      if(d<best){best=d;bestT=t;}
    }
    if(best>90){
      slide.failed=true;
      stopVoice(slide.voice,false);
      slide.voice=null;
      slide.active=false;
      return;
    }
    if(bestT>slide.progress)slide.progress=bestT;
    updateVoice(slide);
    if(slide.progress>.97&&!slide.completed){
      slide.completed=true;slide.completedAt=performance.now();
      stopVoice(slide.voice,true);slide.voice=null;slide.active=false;
      if(typeof palT!=='undefined'){palT+=.3;}
      if(typeof fl!=='undefined'){fl=.5;}
      const m=Math.min(innerWidth,innerHeight);
      const pEnd=pointOnCurve(slide,1);
      window._wave={x:(pEnd.x-innerWidth/2)/m,y:-(pEnd.y-innerHeight/2)/m,born:(performance.now()-st)/1000};
    }
  }
  function endHit(){
    if(!slide||!slide.active)return;
    if(slide.progress<.97){
      slide.failed=true;
      stopVoice(slide.voice,false);
      slide.voice=null;
      slide.active=false;
    }
  }
  addEventListener('touchstart',e=>{const t=e.touches[0];if(!t)return;tryHit(t.clientX,t.clientY);},{passive:true});
  addEventListener('touchmove',e=>{const t=e.touches[0];if(!t)return;moveHit(t.clientX,t.clientY);},{passive:true});
  addEventListener('touchend',endHit,{passive:true});
  addEventListener('mousedown',e=>{tryHit(e.clientX,e.clientY);});
  addEventListener('mousemove',e=>{if(slide&&slide.active)moveHit(e.clientX,e.clientY);});
  addEventListener('mouseup',endHit);
  function render(){
    cx2.clearRect(0,0,innerWidth,innerHeight);
    const now=performance.now();
    if(!slide&&now>nextAt&&typeof sg!=='undefined'&&sg<.05){
      spawn();
    }
    if(slide){
      const age=(now-slide.born)/1000;
      if(!slide.hunting&&!slide.completed&&!slide.failed)slide.appeared=Math.min(1,slide.appeared+.016);
      let alpha=slide.appeared;
      if(slide.completed){
        const fa=(now-slide.completedAt)/1500;
        alpha=Math.max(0,1-fa);
        if(fa>1){slide=null;nextAt=now+(15000+Math.random()*10000);return requestAnimationFrame(render);}
      } else if(slide.failed){
        alpha*=.3;
        if(age>slide.life){slide=null;nextAt=now+(15000+Math.random()*10000);return requestAnimationFrame(render);}
      } else if(age>slide.life){
        slide=null;nextAt=now+(15000+Math.random()*10000);return requestAnimationFrame(render);
      }
      const segs=40;
      for(let i=0;i<segs;i++){
        const t0=i/segs,t1=(i+1)/segs;
        const p0=pointOnCurve(slide,t0),p1=pointOnCurve(slide,t1);
        const pulse=.5+.5*Math.sin(now*.005-t0*6);
        const ahead=t0>slide.progress?1:.3;
        const done=t0<=slide.progress?1:0;
        const a=alpha*(.35+pulse*.3)*ahead+done*alpha*.6;
        cx2.strokeStyle=`hsla(${slide.hue},90%,70%,${a})`;
        cx2.lineWidth=slide.active?5:3;
        cx2.lineCap='round';
        cx2.beginPath();cx2.moveTo(p0.x,p0.y);cx2.lineTo(p1.x,p1.y);cx2.stroke();
      }
      const pA=pointOnCurve(slide,0),pB=pointOnCurve(slide,1);
      const startPulse=1+.3*Math.sin(now*.008);
      const gA=cx2.createRadialGradient(pA.x,pA.y,0,pA.x,pA.y,30*startPulse);
      gA.addColorStop(0,`hsla(${slide.hue},100%,90%,${alpha*.9})`);
      gA.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
      cx2.fillStyle=gA;cx2.beginPath();cx2.arc(pA.x,pA.y,30*startPulse,0,Math.PI*2);cx2.fill();
      const gB=cx2.createRadialGradient(pB.x,pB.y,0,pB.x,pB.y,25);
      gB.addColorStop(0,`hsla(${slide.hue},100%,85%,${alpha*.6})`);
      gB.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
      cx2.fillStyle=gB;cx2.beginPath();cx2.arc(pB.x,pB.y,25,0,Math.PI*2);cx2.fill();
      if(slide.active){
        const pC=pointOnCurve(slide,slide.progress);
        const gC=cx2.createRadialGradient(pC.x,pC.y,0,pC.x,pC.y,50);
        gC.addColorStop(0,`hsla(${slide.hue},100%,95%,${alpha})`);
        gC.addColorStop(.4,`hsla(${slide.hue},100%,80%,${alpha*.5})`);
        gC.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
        cx2.fillStyle=gC;cx2.beginPath();cx2.arc(pC.x,pC.y,50,0,Math.PI*2);cx2.fill();
      }
    }
    requestAnimationFrame(render);
  }
  render();
})();
