function iau(){

    ac=new(window.AudioContext||window.webkitAudioContext)();

// ===== FIREFLIES & CONSTELLATIONS =====
(function(){
  const flies=[];

  let started=false;

  }
  waitStart();
  function phrase(){
    if(!started)return;
    const w=innerWidth,h=innerHeight;
    const baseHue=Math.random()*360;
    const hueSpread=20+Math.random()*35;
    const len=4+Math.floor(Math.random()*6);

    let stepNote=2+Math.floor(Math.random()*6);

      setTimeout(()=>{
        if(!started)return;
        const r=Math.random();
        let delta;
        if(r<.55)delta=(Math.random()<.5?-1:1);
        else if(r<.85)delta=(Math.random()<.5?-2:2);
        else delta=(Math.random()<.5?-4:4);

        const xMargin=w*.1;
        const x=xMargin+Math.random()*(w-xMargin*2);
        const y=yFromStep(stepNote)+(Math.random()-.5)*40;
        const driftAngle=Math.random()*Math.PI*2;
        const driftSpeed=.1+Math.random()*.3;
        const vx=Math.cos(driftAngle)*driftSpeed;
        const vy=Math.sin(driftAngle)*driftSpeed;
        const hue=(baseHue+(Math.random()-.5)*hueSpread+360)%360;
          flies.push({
          x,y,vx,vy,
          r:16+Math.random()*10,
          hue,
          life:1,
          born:performance.now(),
          step:stepNote,
          fadeIn:0,
          pid:pid,
          phaseX:Math.random()*Math.PI*2,
          phaseY:Math.random()*Math.PI*2,
          freqX:.3+Math.random()*.25,
          freqY:.35+Math.random()*.3,
          shape:((typeof pal!=='undefined')?Math.floor(pal):0)%5,
          rot:Math.random()*Math.PI*2,
          rotSpd:(Math.random()-.5)*.4

    }
    const breath=1500+Math.random()*2500;
    setTimeout(()=>{
      const con=constellations[pid];
      if(con&&!con.finale&&!con.deathAt)con.deathAt=performance.now()+3000;
    },len*stepGap+500);

  }

  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';
  document.body.appendChild(cv);
  const cx=cv.getContext('2d');
  function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cx.scale(devicePixelRatio,devicePixelRatio);}
    resize();addEventListener('resize',resize);

      const gA=cx2.createRadialGradient(pA.x,pA.y,0,pA.x,pA.y,30*startPulse);
      gA.addColorStop(0,`hsla(${slide.hue},100%,90%,${alpha*.9})`);
      gA.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
      cx2.fillStyle=gA;cx2.beginPath();cx2.arc(pA.x,pA.y,30*startPulse,0,Math.PI*2);cx2.fill();
      const gB=cx2.createRadialGradient(pB.x,pB.y,0,pB.x,pB.y,25);
      gB.addColorStop(0,`hsla(${slide.hue},100%,85%,${alpha*.6})`);
      gB.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
      cx2.fillStyle=gB;cx2.beginPath();cx2.arc(pB.x,pB.y,25,0,Math.PI*2);cx2.fill();
      if(slide.active){
        const pC=pointOnCurve(slide,slide.progress);
        const gC=cx2.createRadialGradient(pC.x,pC.y,0,pC.x,pC.y,50);
        gC.addColorStop(0,`hsla(${slide.hue},100%,95%,${alpha})`);
        gC.addColorStop(.4,`hsla(${slide.hue},100%,80%,${alpha*.5})`);
        gC.addColorStop(1,`hsla(${slide.hue},100%,70%,0)`);
        cx2.fillStyle=gC;cx2.beginPath();cx2.arc(pC.x,pC.y,50,0,Math.PI*2);cx2.fill();
      }
    }
    requestAnimationFrame(render);
  }
    render();
})();

// ===== STARFIELD (both welcome screen and main) =====
(function(){
  const skyCv=document.getElementById('sky');
  const skyCx=skyCv.getContext('2d');
  const mainCv=document.createElement('canvas');
  mainCv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:1';
  document.body.insertBefore(mainCv,document.body.firstChild.nextSibling);
  const mainCx=mainCv.getContext('2d');
  const stars=[];
  function genStars(){
    stars.length=0;
    const count=Math.floor((innerWidth*innerHeight)/5500);
    for(let i=0;i<count;i++){
      const bright=Math.random();
      stars.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:bright>.96?1.4+Math.random()*.8:.3+Math.random()*.9,
        phase:Math.random()*Math.PI*2,
        freq:.3+Math.random()*.7,
        baseA:bright>.96?.9:.35+Math.random()*.4,
        hue:bright>.96?(Math.random()<.5?210:40):215+Math.random()*40,
        drift:Math.random()<.3?(Math.random()-.5)*.02:0
      });
    }
  }
  function resizeSky(){
    const dpr=Math.min(devicePixelRatio||1,2);
    [skyCv,mainCv].forEach(cv=>{
      cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;
      cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';
    });
    skyCx.setTransform(dpr,0,0,dpr,0,0);
    mainCx.setTransform(dpr,0,0,dpr,0,0);
    genStars();
  }
  resizeSky();addEventListener('resize',resizeSky);
  function drawStars(cx,opacity){
    cx.clearRect(0,0,innerWidth,innerHeight);
    const t=performance.now()*.001;
    for(const s of stars){
      if(s.drift){s.x+=s.drift;if(s.x<0)s.x+=innerWidth;if(s.x>innerWidth)s.x-=innerWidth;}
      const twinkle=.5+.5*Math.sin(t*s.freq+s.phase);
      const a=s.baseA*(.4+twinkle*.6)*opacity;
      const gl=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
      gl.addColorStop(0,`hsla(${s.hue},60%,90%,${a})`);
      gl.addColorStop(.4,`hsla(${s.hue},60%,80%,${a*.3})`);
      gl.addColorStop(1,`hsla(${s.hue},60%,70%,0)`);
      cx.fillStyle=gl;
      cx.beginPath();cx.arc(s.x,s.y,s.r*4,0,Math.PI*2);cx.fill();
      cx.fillStyle=`hsla(${s.hue},30%,98%,${a*1.2})`;
      cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
    }
  }
  function tick(){
    const sEl=document.getElementById('s');
    const onWelcome=!sEl.classList.contains('h');
    if(onWelcome)drawStars(skyCx,1);
    else skyCx.clearRect(0,0,innerWidth,innerHeight);
    drawStars(mainCx,.7);
    requestAnimationFrame(tick);
  }
    tick();
})();

// ===== FINALE (appears once per session after 5th sing) =====
(function(){
  const cvF=document.createElement('canvas');
  cvF.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:10000';
  document.body.appendChild(cvF);
  const cxF=cvF.getContext('2d');
  function resizeF(){
    const dpr=Math.min(devicePixelRatio||1,2);
    cvF.width=innerWidth*dpr;cvF.height=innerHeight*dpr;
    cvF.style.width=innerWidth+'px';cvF.style.height=innerHeight+'px';
    cxF.setTransform(dpr,0,0,dpr,0,0);
  }
  resizeF();addEventListener('resize',resizeF);
  let state=null;
  function drawShape(cx,x,y,r,hue,rot,shape,alpha){
    cx.save();cx.globalAlpha=alpha;cx.translate(x,y);cx.rotate(rot);
    if(shape===0){
      const g=cx.createRadialGradient(0,0,0,0,0,r*1.5);
      g.addColorStop(0,`hsla(${hue},100%,98%,1)`);
      g.addColorStop(.4,`hsla(${hue},100%,85%,.7)`);
      g.addColorStop(1,`hsla(${hue},100%,70%,0)`);
      cx.fillStyle=g;cx.beginPath();cx.arc(0,0,r*1.5,0,Math.PI*2);cx.fill();
    } else if(shape===1){
      const g=cx.createRadialGradient(0,0,0,0,0,r*1.3);
      g.addColorStop(0,`hsla(${hue},100%,92%,.9)`);
      g.addColorStop(1,`hsla(${hue},100%,75%,0)`);
      cx.fillStyle=g;
      cx.beginPath();
      for(let k=0;k<6;k++){const ang=k*Math.PI/3;cx[k?'lineTo':'moveTo'](Math.cos(ang)*r*1.3,Math.sin(ang)*r*1.3);}
      cx.closePath();cx.fill();
      cx.strokeStyle=`hsla(${hue},100%,95%,1)`;cx.lineWidth=3;cx.lineJoin='round';cx.stroke();
    } else if(shape===2){
      const core=cx.createRadialGradient(0,0,0,0,0,r*.5);
      core.addColorStop(0,`hsla(${hue},100%,98%,1)`);
      core.addColorStop(1,`hsla(${hue},100%,85%,0)`);
      cx.fillStyle=core;
      cx.beginPath();cx.arc(0,0,r*.5,0,Math.PI*2);cx.fill();
      cx.strokeStyle=`hsla(${hue},100%,95%,.95)`;cx.lineCap='round';
      for(let k=0;k<4;k++){
        const ang=k*Math.PI/2;
        const len=r*(k%2?1.4:2.0);
        cx.lineWidth=k%2?2.5:4;
        cx.beginPath();
        cx.moveTo(-Math.cos(ang)*len*.2,-Math.sin(ang)*len*.2);
        cx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len);
        cx.stroke();
      }
    } else if(shape===3){
      const g=cx.createRadialGradient(0,0,0,0,0,r*1.4);
      g.addColorStop(0,`hsla(${hue},100%,95%,.95)`);
      g.addColorStop(1,`hsla(${hue},100%,75%,0)`);
      cx.fillStyle=g;
      cx.beginPath();
      const steps=80;
      for(let k=0;k<=steps;k++){
        const th=k/steps*Math.PI*2;
        const rr=r*1.3*(.45+.55*Math.abs(Math.cos(2.5*th)));
        const px=Math.cos(th)*rr,py=Math.sin(th)*rr;
        cx[k?'lineTo':'moveTo'](px,py);
      }
      cx.closePath();cx.fill();
    } else {
      const g1=cx.createRadialGradient(0,0,r*.55,0,0,r*1.3);
      g1.addColorStop(0,`hsla(${hue},90%,85%,0)`);
      g1.addColorStop(.4,`hsla(${hue},100%,92%,1)`);
      g1.addColorStop(.6,`hsla(${hue},100%,85%,.9)`);
      g1.addColorStop(1,`hsla(${hue},100%,70%,0)`);
      cx.fillStyle=g1;
      cx.beginPath();cx.arc(0,0,r*1.3,0,Math.PI*2);cx.fill();
    }
    cx.restore();
  }
  function minorChord(){
    if(typeof ac==='undefined'||!ac)return;
    const t=ac.currentTime;
    const oct=(typeof octave!=='undefined'?octave:0);
    // A minor root 110 * 2^oct: A, C, E, A(oct up) = 110, 130.81, 164.81, 220
    const roots=[110,130.81,164.81,220].map(f=>f*Math.pow(2,oct));
    roots.forEach((fr,i)=>{
      const o=ac.createOscillator();o.type='sine';o.frequency.value=fr;
      const g=ac.createGain();const stt=t+i*.15;
      g.gain.setValueAtTime(0,stt);
      g.gain.linearRampToValueAtTime(.15,stt+1.5);
      g.gain.linearRampToValueAtTime(.12,stt+8);
      g.gain.exponentialRampToValueAtTime(.001,stt+12);
      o.connect(g);g.connect(mg);
      o.start(stt);o.stop(stt+12.1);
      // soft LFO for breathing
      const lfo=ac.createOscillator();lfo.type='sine';lfo.frequency.value=.2+i*.05;
      const lfoG=ac.createGain();lfoG.gain.value=fr*.003;
      lfo.connect(lfoG);lfoG.connect(o.frequency);
      lfo.start(stt);lfo.stop(stt+12.1);
    });
  }
  window._triggerFinale=function(){
    if(state)return;
    state={
      start:performance.now(),
      phase:'converge', // converge → morph → explode → fade
      particles:[],
      shapeIdx:0,
      shapeStart:performance.now()+2000,
      rot:0
    };
    minorChord();
  };
  function render(){
    requestAnimationFrame(render);
    if(!state){cxF.clearRect(0,0,innerWidth,innerHeight);return;}
    const now=performance.now();
    const age=(now-state.start)/1000;
    cxF.clearRect(0,0,innerWidth,innerHeight);
    const cx=innerWidth/2,cy=innerHeight/2;
    // darkening overlay
    let darkA=0;
    if(age<0.8)darkA=age/0.8*0.88;
    else if(age<10)darkA=0.88;
    else if(age<12)darkA=0.88*(1-(age-10)/2);
    cxF.fillStyle=`rgba(0,0,0,${darkA})`;
    cxF.fillRect(0,0,innerWidth,innerHeight);
    // phase: converge (0-2s) — pull all flies to center visually
    if(age<2 && window._finaleFlies===undefined){
      // signal firefly system to collapse
      window._finaleCenterX=cx;
      window._finaleCenterY=cy;
      window._finaleConverge=Math.min(1,age/1.2);
    }
    // phase: morph shapes (2s - 8s) — 5 shapes, 1.2s each
    if(age>=2&&age<8){
      const shapeAge=(age-2);
      const idx=Math.min(4,Math.floor(shapeAge/1.2));
      const within=(shapeAge-idx*1.2)/1.2; // 0..1 within this shape
      state.rot+=0.016;
      const baseR=80+Math.sin(within*Math.PI)*20;
      const hues=[280,200,45,330,160];
      const hue=hues[idx];
      // fade in/out within shape
      let sa=1;
      if(within<0.15)sa=within/0.15;
      else if(within>0.85)sa=(1-within)/0.15;
      sa=Math.max(0,Math.min(1,sa));
      // big outer glow
      const gl=cxF.createRadialGradient(cx,cy,0,cx,cy,baseR*4);
      gl.addColorStop(0,`hsla(${hue},90%,80%,${sa*.5})`);
      gl.addColorStop(.5,`hsla(${hue},90%,70%,${sa*.15})`);
      gl.addColorStop(1,`hsla(${hue},90%,60%,0)`);
      cxF.fillStyle=gl;
      cxF.beginPath();cxF.arc(cx,cy,baseR*4,0,Math.PI*2);cxF.fill();
      drawShape(cxF,cx,cy,baseR,hue,state.rot,idx,sa);
    }
    // phase: explode (8s - 10s)
    if(age>=8 && state.particles.length===0){
      const hues=[280,200,45,330,160];
      for(let i=0;i<80;i++){
        const ang=Math.random()*Math.PI*2;
        const sp=200+Math.random()*500;
        const hue=hues[Math.floor(Math.random()*5)]+(Math.random()-.5)*30;
        state.particles.push({
          x:cx,y:cy,
          vx:Math.cos(ang)*sp,
          vy:Math.sin(ang)*sp,
          hue:hue,
          r:3+Math.random()*6,
          born:now
        });
      }
    }
    if(state.particles.length>0){
      const dt=0.016;
      for(const p of state.particles){
        p.x+=p.vx*dt;p.y+=p.vy*dt;
        p.vx*=0.97;p.vy*=0.97;
      }
      const pAge=(age-8)/2;
      const palpha=Math.max(0,1-pAge);
      for(const p of state.particles){
        const gl=cxF.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
        gl.addColorStop(0,`hsla(${p.hue},100%,85%,${palpha})`);
        gl.addColorStop(.4,`hsla(${p.hue},100%,75%,${palpha*.5})`);
        gl.addColorStop(1,`hsla(${p.hue},100%,65%,0)`);
        cxF.fillStyle=gl;
        cxF.beginPath();cxF.arc(p.x,p.y,p.r*4,0,Math.PI*2);cxF.fill();
        cxF.fillStyle=`hsla(${p.hue},100%,95%,${palpha})`;
        cxF.beginPath();cxF.arc(p.x,p.y,p.r,0,Math.PI*2);cxF.fill();
      }
    }
    // finish
    if(age>12){
      state=null;
      window._finaleConverge=undefined;
      window._finaleCenterX=undefined;
      window._finaleCenterY=undefined;
      cxF.clearRect(0,0,innerWidth,innerHeight);
    }
  }
  render();
})();
